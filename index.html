<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双均线量化交易策略回测系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1d29 0%, #252836 100%); padding: 20px 30px; border-bottom: 1px solid #2a2d3a; }
.header h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }
.container { display: flex; gap: 16px; padding: 16px; max-width: 1600px; margin: 0 auto; }
.sidebar { width: 280px; flex-shrink: 0; background: #1a1d29; border-radius: 8px; padding: 20px; border: 1px solid #2a2d3a; }
.main { flex: 1; min-width: 0; }
.panel { background: #1a1d29; border-radius: 8px; padding: 20px; border: 1px solid #2a2d3a; margin-bottom: 16px; }
.panel-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.panel-title::before { content: ''; width: 3px; height: 16px; background: #4a9eff; border-radius: 2px; }
.control-group { margin-bottom: 16px; }
.control-group label { display: block; font-size: 12px; color: #999; margin-bottom: 6px; }
.control-group .value { color: #4a9eff; font-weight: 600; font-size: 13px; }
input[type="range"] { width: 100%; -webkit-appearance: none; height: 4px; background: #2a2d3a; border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #4a9eff; border-radius: 50%; cursor: pointer; }
input[type="number"], select { width: 100%; background: #252836; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
.stock-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stock-check { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #252836; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
.stock-check:hover { background: #2d3142; }
.stock-check input { accent-color: #4a9eff; }
.stock-check .cat { font-size: 10px; padding: 1px 5px; border-radius: 2px; margin-left: auto; }
.cat-blue { background: #1a3a5c; color: #6bb6ff; }
.cat-tech { background: #3a1a3c; color: #e06bb6; }
.btn-run { width: 100%; background: linear-gradient(135deg, #4a9eff, #3a8eef); color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
.btn-run:hover { opacity: 0.9; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric-card { background: #252836; border-radius: 6px; padding: 14px; text-align: center; }
.metric-card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-card .value { font-size: 20px; font-weight: 700; }
.pos { color: #ef4444; } .neg { color: #22c55e; } .neutral { color: #e0e0e0; }
canvas { display: block; width: 100%; }
.chart-wrap { position: relative; width: 100%; }
#priceChart { height: 400px; }
#equityChart { height: 350px; }
#compareChart { height: 300px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #2a2d3a; }
th { color: #888; font-weight: 500; }
td { color: #ccc; }
.tag-buy { color: #ef4444; font-weight: 600; }
.tag-sell { color: #22c55e; font-weight: 600; }
.tag-stop { color: #f59e0b; font-weight: 600; }
.tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.tab { padding: 8px 16px; background: #252836; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 13px; color: #888; transition: all 0.2s; }
.tab.active { background: #4a9eff; color: #fff; }
.tab:hover:not(.active) { color: #ccc; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.trade-log { max-height: 300px; overflow-y: auto; }
.trade-log::-webkit-scrollbar { width: 4px; }
.trade-log::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
.loading { text-align: center; padding: 40px; color: #888; }
@media (max-width: 900px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
</style>
</head>
<body>
<div class="header">
  <h1>双均线量化交易策略回测系统</h1>
  <p>基于5/30日均线交叉策略 | 含止损/滑点/手续费 | 5只股票对比分析</p>
</div>

<div class="container">
  <div class="sidebar">
    <div class="control-group">
      <label>选择股票</label>
      <div class="stock-checks" id="stockChecks"></div>
    </div>
    <div class="control-group">
      <label>短期均线（天）<span class="value" id="vShortMA">5</span></label>
      <input type="range" id="shortMA" min="2" max="30" value="5">
    </div>
    <div class="control-group">
      <label>长期均线（天）<span class="value" id="vLongMA">30</span></label>
      <input type="range" id="longMA" min="10" max="120" value="30">
    </div>
    <div class="control-group">
      <label>止损比例（%）<span class="value" id="vStopLoss">5</span></label>
      <input type="range" id="stopLoss" min="1" max="20" value="5" step="0.5">
    </div>
    <div class="control-group">
      <label>滑点（%）<span class="value" id="vSlippage">0.1</span></label>
      <input type="range" id="slippage" min="0" max="1" value="0.1" step="0.05">
    </div>
    <div class="control-group">
      <label>手续费率（%）<span class="value" id="vCommission">0.05</span></label>
      <input type="range" id="commission" min="0" max="0.5" value="0.05" step="0.01">
    </div>
    <div class="control-group">
      <label>初始资金（元）</label>
      <input type="number" id="initCapital" value="100000" step="10000">
    </div>
    <div class="control-group">
      <label>起始日期</label>
      <input type="date" id="startDate" value="2025-07-10">
    </div>
    <div class="control-group">
      <label>结束日期</label>
      <input type="date" id="endDate" value="2026-07-10">
    </div>
    <button class="btn-run" onclick="runBacktest()">运行回测</button>
  </div>

  <div class="main">
    <div class="panel">
      <div class="panel-title">策略表现概览</div>
      <div class="metrics-grid" id="metricsGrid">
        <div class="metric-card"><div class="label">策略收益率</div><div class="value neutral" id="mReturn">--</div></div>
        <div class="metric-card"><div class="label">买入持有收益率</div><div class="value neutral" id="mBuyHold">--</div></div>
        <div class="metric-card"><div class="label">超额收益</div><div class="value neutral" id="mExcess">--</div></div>
        <div class="metric-card"><div class="label">最大回撤</div><div class="value neutral" id="mMaxDD">--</div></div>
        <div class="metric-card"><div class="label">年化收益</div><div class="value neutral" id="mAnnual">--</div></div>
        <div class="metric-card"><div class="label">夏普比率</div><div class="value neutral" id="mSharpe">--</div></div>
        <div class="metric-card"><div class="label">交易次数</div><div class="value neutral" id="mTrades">--</div></div>
        <div class="metric-card"><div class="label">胜率</div><div class="value neutral" id="mWinRate">--</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">价格走势与交易信号</div>
      <div class="tabs" id="stockTabs"></div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
      <div class="legend" id="priceLegend"></div>
    </div>

    <div class="panel">
      <div class="panel-title">资金曲线（策略 vs 买入持有）</div>
      <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-title">多股票收益对比</div>
      <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-title">交易记录</div>
      <div class="trade-log">
        <table>
          <thead><tr><th>股票</th><th>日期</th><th>类型</th><th>价格</th><th>数量</th><th>金额</th><th>手续费</th><th>原因</th></tr></thead>
          <tbody id="tradeLog"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

let currentStock = '';
let backtestResults = {};
let activeStocks = new Set();

// ========== 初始化 ==========
function init() {
  const codes = Object.keys(STOCK_DATA);
  codes.forEach(c => activeStocks.add(c));
  currentStock = codes[0];
  
  // 渲染股票选择
  const checksEl = document.getElementById('stockChecks');
  codes.forEach(code => {
    const s = STOCK_DATA[code];
    const div = document.createElement('div');
    div.className = 'stock-check';
    div.innerHTML = `<input type="checkbox" checked data-code="${code}"><span>${s.name}</span><span class="cat ${s.category==='蓝筹股'?'cat-blue':'cat-tech'}">${s.category}</span>`;
    div.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) activeStocks.add(code);
      else activeStocks.delete(code);
    });
    checksEl.appendChild(div);
  });
  
  // 渲染标签页
  renderTabs();
  
  // 绑定滑块
  ['shortMA','longMA','stopLoss','slippage','commission'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1)).textContent = el.value;
    });
  });
  
  // 自动运行
  runBacktest();
}

function renderTabs() {
  const tabsEl = document.getElementById('stockTabs');
  tabsEl.innerHTML = '';
  Array.from(activeStocks).forEach(code => {
    const s = STOCK_DATA[code];
    const tab = document.createElement('div');
    tab.className = 'tab' + (code === currentStock ? ' active' : '');
    tab.textContent = s.name;
    tab.onclick = () => { currentStock = code; renderTabs(); drawPriceChart(); };
    tabsEl.appendChild(tab);
  });
}

// ========== 回测引擎 ==========
function calculateMA(data, period) {
  const ma = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { ma.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j][4]; // close
    ma.push(sum / period);
  }
  return ma;
}

function runBacktestEngine(stockData, params) {
  const { shortMAPeriod, longMAPeriod, stopLossPct, slippagePct, commissionPct, initCapital, startDate, endDate } = params;
  
  // 过滤日期范围
  const sd = startDate.replace(/-/g, '');
  const ed = endDate.replace(/-/g, '');
  const data = stockData.filter(d => d[0] >= sd && d[0] <= ed);
  
  if (data.length < longMAPeriod + 5) return { error: '数据不足' };
  
  const shortMA = calculateMA(data, shortMAPeriod);
  const longMA = calculateMA(data, longMAPeriod);
  
  let capital = initCapital;
  let position = 0; // 持有股数
  let entryPrice = 0;
  let trades = [];
  let equityCurve = [];
  let maxEquity = initCapital;
  let maxDrawdown = 0;
  let wins = 0, losses = 0;
  
  for (let i = 1; i < data.length; i++) {
    if (!shortMA[i] || !longMA[i] || !shortMA[i-1] || !longMA[i-1]) {
      equityCurve.push({ date: data[i][0], equity: capital + (position > 0 ? position * data[i][4] : 0) });
      continue;
    }
    
    const prevCross = shortMA[i-1] - longMA[i-1];
    const currCross = shortMA[i] - longMA[i];
    const todayClose = data[i][4];
    
    // 止损检查（持仓时）
    if (position > 0 && todayClose <= entryPrice * (1 - stopLossPct / 100)) {
      // 止损卖出
      const sellPrice = todayClose * (1 - slippagePct / 100);
      const tradeAmount = position * sellPrice;
      const fee = tradeAmount * commissionPct / 100;
      capital += tradeAmount - fee;
      trades.push({ date: data[i][0], type: 'stop', price: sellPrice, qty: position, amount: tradeAmount, fee: fee, reason: '止损' });
      if (sellPrice < entryPrice) losses++; else wins++;
      position = 0;
    }
    
    // 金叉买入
    if (prevCross <= 0 && currCross > 0 && position === 0) {
      const buyPrice = todayClose * (1 + slippagePct / 100);
      const maxQty = Math.floor(capital / (buyPrice * (1 + commissionPct / 100)));
      if (maxQty > 0) {
        const tradeAmount = maxQty * buyPrice;
        const fee = tradeAmount * commissionPct / 100;
        capital -= tradeAmount + fee;
        position = maxQty;
        entryPrice = buyPrice;
        trades.push({ date: data[i][0], type: 'buy', price: buyPrice, qty: maxQty, amount: tradeAmount, fee: fee, reason: '金叉买入' });
      }
    }
    
    // 死叉卖出
    if (prevCross >= 0 && currCross < 0 && position > 0) {
      const sellPrice = todayClose * (1 - slippagePct / 100);
      const tradeAmount = position * sellPrice;
      const fee = tradeAmount * commissionPct / 100;
      capital += tradeAmount - fee;
      trades.push({ date: data[i][0], type: 'sell', price: sellPrice, qty: position, amount: tradeAmount, fee: fee, reason: '死叉卖出' });
      if (sellPrice > entryPrice) wins++; else losses++;
      position = 0;
    }
    
    // 计算当日总权益
    const equity = capital + (position > 0 ? position * todayClose : 0);
    equityCurve.push({ date: data[i][0], equity: equity });
    if (equity > maxEquity) maxEquity = equity;
    const dd = (maxEquity - equity) / maxEquity;
    if (dd > maxDrawdown) maxDrawdown = dd;
  }
  
  // 如果最后还持仓，按最后收盘价平仓
  if (position > 0) {
    const lastClose = data[data.length - 1][4];
    const sellPrice = lastClose * (1 - slippagePct / 100);
    const tradeAmount = position * sellPrice;
    const fee = tradeAmount * commissionPct / 100;
    capital += tradeAmount - fee;
    trades.push({ date: data[data.length - 1][0], type: 'sell', price: sellPrice, qty: position, amount: tradeAmount, fee: fee, reason: '期末平仓' });
    if (sellPrice > entryPrice) wins++; else losses++;
    position = 0;
  }
  
  const finalEquity = capital;
  const totalReturn = (finalEquity / initCapital - 1) * 100;
  const buyHoldReturn = (data[data.length-1][4] / data[0][4] - 1) * 100;
  const excessReturn = totalReturn - buyHoldReturn;
  const tradingDays = data.length;
  const annualReturn = (Math.pow(finalEquity / initCapital, 250 / tradingDays) - 1) * 100;
  
  // 夏普比率
  const dailyReturns = [];
  for (let i = 1; i < equityCurve.length; i++) {
    dailyReturns.push((equityCurve[i].equity / equityCurve[i-1].equity - 1));
  }
  const avgDaily = dailyReturns.reduce((a,b) => a+b, 0) / dailyReturns.length;
  const stdDaily = Math.sqrt(dailyReturns.reduce((a,b) => a + (b-avgDaily)**2, 0) / dailyReturns.length);
  const sharpe = stdDaily > 0 ? (avgDaily / stdDaily) * Math.sqrt(250) : 0;
  
  const winRate = trades.filter(t => t.type === 'sell' || t.type === 'stop').length > 0 
    ? (wins / (wins + losses)) * 100 : 0;
  
  return {
    data, shortMA, longMA, trades, equityCurve,
    finalEquity, totalReturn, buyHoldReturn, excessReturn,
    maxDrawdown: maxDrawdown * 100, annualReturn, sharpe,
    tradeCount: trades.filter(t => t.type === 'buy').length,
    winRate, buyHoldEquity: initCapital * (1 + buyHoldReturn / 100)
  };
}

// ========== 运行回测 ==========
function runBacktest() {
  const params = {
    shortMAPeriod: parseInt(document.getElementById('shortMA').value),
    longMAPeriod: parseInt(document.getElementById('longMA').value),
    stopLossPct: parseFloat(document.getElementById('stopLoss').value),
    slippagePct: parseFloat(document.getElementById('slippage').value),
    commissionPct: parseFloat(document.getElementById('commission').value),
    initCapital: parseFloat(document.getElementById('initCapital').value),
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value
  };
  
  if (params.shortMAPeriod >= params.longMAPeriod) {
    alert('短期均线天数必须小于长期均线天数');
    return;
  }
  
  backtestResults = {};
  Array.from(activeStocks).forEach(code => {
    const result = runBacktestEngine(STOCK_DATA[code].data, params);
    backtestResults[code] = result;
  });
  
  renderTabs();
  updateMetrics();
  drawPriceChart();
  drawEquityChart();
  drawCompareChart();
  renderTradeLog();
}

// ========== 更新指标 ==========
function updateMetrics() {
  const r = backtestResults[currentStock];
  if (!r || r.error) {
    ['mReturn','mBuyHold','mExcess','mMaxDD','mAnnual','mSharpe','mTrades','mWinRate'].forEach(id => {
      document.getElementById(id).textContent = '--';
      document.getElementById(id).className = 'value neutral';
    });
    return;
  }
  
  const setVal = (id, val, suffix='%') => {
    const el = document.getElementById(id);
    el.textContent = val.toFixed(2) + suffix;
    el.className = 'value ' + (val > 0 ? 'pos' : val < 0 ? 'neg' : 'neutral');
  };
  
  setVal('mReturn', r.totalReturn);
  setVal('mBuyHold', r.buyHoldReturn);
  setVal('mExcess', r.excessReturn);
  setVal('mMaxDD', -r.maxDrawdown);
  setVal('mAnnual', r.annualReturn);
  document.getElementById('mSharpe').textContent = r.sharpe.toFixed(2);
  document.getElementById('mSharpe').className = 'value ' + (r.sharpe > 1 ? 'pos' : r.sharpe < 0 ? 'neg' : 'neutral');
  document.getElementById('mTrades').textContent = r.tradeCount;
  document.getElementById('mTrades').className = 'value neutral';
  document.getElementById('mWinRate').textContent = r.winRate.toFixed(1) + '%';
  document.getElementById('mWinRate').className = 'value ' + (r.winRate >= 50 ? 'pos' : 'neg');
}

// ========== 绘图函数 ==========
function setupCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

function drawPriceChart() {
  const { ctx, w, h } = setupCanvas('priceChart');
  ctx.clearRect(0, 0, w, h);
  
  const r = backtestResults[currentStock];
  if (!r || r.error) { ctx.fillStyle = '#888'; ctx.font = '14px sans-serif'; ctx.fillText('无数据', w/2-30, h/2); return; }
  
  const stock = STOCK_DATA[currentStock];
  const padding = { top: 20, right: 60, bottom: 40, left: 10 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;
  
  // 价格范围
  let minP = Infinity, maxP = -Infinity;
  r.data.forEach(d => { minP = Math.min(minP, d[3], d[4]); maxP = Math.max(maxP, d[2], d[4]); });
  const pRange = maxP - minP;
  minP -= pRange * 0.05; maxP += pRange * 0.05;
  
  const xStep = chartW / r.data.length;
  const yScale = chartH / (maxP - minP);
  
  // 网格线
  ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 1; ctx.font = '10px sans-serif'; ctx.fillStyle = '#666';
  for (let i = 0; i <= 5; i++) {
    const y = padding.top + chartH * i / 5;
    const price = maxP - (maxP - minP) * i / 5;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(padding.left + chartW, y); ctx.stroke();
    ctx.fillText(price.toFixed(2), padding.left + chartW + 5, y + 3);
  }
  
  // X轴日期
  const dateStep = Math.floor(r.data.length / 6);
  for (let i = 0; i < r.data.length; i += dateStep) {
    const d = r.data[i][0];
    const label = d.substring(4,6) + '/' + d.substring(6,8);
    ctx.fillText(label, padding.left + i * xStep, h - 10);
  }
  
  // 收盘价线
  ctx.strokeStyle = '#4a9eff'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  r.data.forEach((d, i) => {
    const x = padding.left + i * xStep;
    const y = padding.top + (maxP - d[4]) * yScale;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // 短期均线
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1; ctx.setLineDash([]);
  ctx.beginPath();
  let started = false;
  r.shortMA.forEach((v, i) => {
    if (v === null) return;
    const x = padding.left + i * xStep;
    const y = padding.top + (maxP - v) * yScale;
    if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // 长期均线
  ctx.strokeStyle = '#e06bb6'; ctx.lineWidth = 1;
  ctx.beginPath();
  started = false;
  r.longMA.forEach((v, i) => {
    if (v === null) return;
    const x = padding.left + i * xStep;
    const y = padding.top + (maxP - v) * yScale;
    if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // 交易标记
  r.trades.forEach(t => {
    const idx = r.data.findIndex(d => d[0] === t.date);
    if (idx < 0) return;
    const x = padding.left + idx * xStep;
    const y = padding.top + (maxP - t.price) * yScale;
    
    if (t.type === 'buy') {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.moveTo(x, y + 2); ctx.lineTo(x - 4, y + 8); ctx.lineTo(x + 4, y + 8); ctx.closePath(); ctx.fill();
    } else if (t.type === 'sell') {
      ctx.fillStyle = '#22c55e';
      ctx.beginPath(); ctx.moveTo(x, y - 2); ctx.lineTo(x - 4, y - 8); ctx.lineTo(x + 4, y - 8); ctx.closePath(); ctx.fill();
    } else if (t.type === 'stop') {
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    }
  });
  
  // 图例
  document.getElementById('priceLegend').innerHTML = 
    '<div class="legend-item"><div class="legend-dot" style="background:#4a9eff"></div>收盘价</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>短期MA(' + document.getElementById('shortMA').value + ')</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#e06bb6"></div>长期MA(' + document.getElementById('longMA').value + ')</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>买入</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>卖出</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>止损</div>';
}

function drawEquityChart() {
  const { ctx, w, h } = setupCanvas('equityChart');
  ctx.clearRect(0, 0, w, h);
  
  const r = backtestResults[currentStock];
  if (!r || r.error) return;
  
  const padding = { top: 20, right: 60, bottom: 40, left: 10 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;
  
  // 资金范围
  let minE = Infinity, maxE = -Infinity;
  r.equityCurve.forEach(e => { minE = Math.min(minE, e.equity); maxE = Math.max(maxE, e.equity); });
  const initCap = parseFloat(document.getElementById('initCapital').value);
  minE = Math.min(minE, initCap); maxE = Math.max(maxE, initCap);
  const eRange = maxE - minE;
  minE -= eRange * 0.05; maxE += eRange * 0.05;
  
  const xStep = chartW / r.equityCurve.length;
  const yScale = chartH / (maxE - minE);
  
  // 网格
  ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 1; ctx.font = '10px sans-serif'; ctx.fillStyle = '#666';
  for (let i = 0; i <= 5; i++) {
    const y = padding.top + chartH * i / 5;
    const val = maxE - (maxE - minE) * i / 5;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(padding.left + chartW, y); ctx.stroke();
    ctx.fillText(val.toFixed(0), padding.left + chartW + 5, y + 3);
  }
  
  // X轴
  const dateStep = Math.floor(r.equityCurve.length / 6);
  for (let i = 0; i < r.equityCurve.length; i += dateStep) {
    const d = r.equityCurve[i].date;
    ctx.fillText(d.substring(4,6) + '/' + d.substring(6,8), padding.left + i * xStep, h - 10);
  }
  
  // 初始资金线
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  const yInit = padding.top + (maxE - initCap) * yScale;
  ctx.beginPath(); ctx.moveTo(padding.left, yInit); ctx.lineTo(padding.left + chartW, yInit); ctx.stroke();
  ctx.setLineDash([]);
  
  // 策略资金曲线
  ctx.strokeStyle = '#4a9eff'; ctx.lineWidth = 2;
  ctx.beginPath();
  r.equityCurve.forEach((e, i) => {
    const x = padding.left + i * xStep;
    const y = padding.top + (maxE - e.equity) * yScale;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // 买入持有曲线
  const initCap2 = parseFloat(document.getElementById('initCapital').value);
  const firstClose = r.data[0][4];
  const lastClose = r.data[r.data.length-1][4];
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
  ctx.beginPath();
  r.data.forEach((d, i) => {
    const x = padding.left + i * xStep;
    const bhEquity = initCap2 * (d[4] / firstClose);
    const y = padding.top + (maxE - bhEquity) * yScale;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCompareChart() {
  const { ctx, w, h } = setupCanvas('compareChart');
  ctx.clearRect(0, 0, w, h);
  
  const padding = { top: 20, right: 120, bottom: 40, left: 10 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;
  
  const codes = Array.from(activeStocks);
  const colors = ['#4a9eff', '#ef4444', '#22c55e', '#f59e0b', '#a78bfa'];
  
  // 收集所有收益率
  let maxR = -Infinity, minR = Infinity;
  const series = {};
  codes.forEach(code => {
    const r = backtestResults[code];
    if (!r || r.error) return;
    const returns = r.equityCurve.map(e => (e.equity / parseFloat(document.getElementById('initCapital').value) - 1) * 100);
    series[code] = returns;
    maxR = Math.max(maxR, ...returns);
    minR = Math.min(minR, ...returns);
  });
  
  if (Object.keys(series).length === 0) return;
  
  maxR = Math.max(maxR, 5); minR = Math.min(minR, -5);
  const rRange = maxR - minR;
  maxR += rRange * 0.05; minR -= rRange * 0.05;
  
  const maxLen = Math.max(...Object.values(series).map(s => s.length));
  const xStep = chartW / maxLen;
  const yScale = chartH / (maxR - minR);
  
  // 网格
  ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 1; ctx.font = '10px sans-serif'; ctx.fillStyle = '#666';
  for (let i = 0; i <= 5; i++) {
    const y = padding.top + chartH * i / 5;
    const val = maxR - (maxR - minR) * i / 5;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(padding.left + chartW, y); ctx.stroke();
    ctx.fillText(val.toFixed(1) + '%', padding.left + chartW + 5, y + 3);
  }
  
  // 0线
  if (minR < 0 && maxR > 0) {
    ctx.strokeStyle = '#444'; ctx.setLineDash([4,4]);
    const y0 = padding.top + (maxR - 0) * yScale;
    ctx.beginPath(); ctx.moveTo(padding.left, y0); ctx.lineTo(padding.left + chartW, y0); ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // 绘制各股票曲线
  let colorIdx = 0;
  codes.forEach(code => {
    if (!series[code]) return;
    const color = colors[colorIdx++ % colors.length];
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath();
    series[code].forEach((v, i) => {
      const x = padding.left + i * xStep;
      const y = padding.top + (maxR - v) * yScale;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // 图例
    const s = STOCK_DATA[code];
    const legendY = padding.top + 5 + (colorIdx - 1) * 16;
    ctx.fillStyle = color;
    ctx.fillRect(padding.left + chartW + 45, legendY, 8, 8);
    ctx.fillStyle = '#ccc'; ctx.font = '11px sans-serif';
    ctx.fillText(s.name, padding.left + chartW + 56, legendY + 7);
  });
}

// ========== 交易记录 ==========
function renderTradeLog() {
  const tbody = document.getElementById('tradeLog');
  tbody.innerHTML = '';
  
  Array.from(activeStocks).forEach(code => {
    const r = backtestResults[code];
    if (!r || r.error) return;
    const name = STOCK_DATA[code].name;
    r.trades.forEach(t => {
      const tr = document.createElement('tr');
      const typeClass = t.type === 'buy' ? 'tag-buy' : t.type === 'sell' ? 'tag-sell' : 'tag-stop';
      const typeText = t.type === 'buy' ? '买入' : t.type === 'sell' ? '卖出' : '止损';
      tr.innerHTML = `<td>${name}</td><td>${t.date}</td><td class="${typeClass}">${typeText}</td><td>${t.price.toFixed(2)}</td><td>${t.qty}</td><td>${t.amount.toFixed(0)}</td><td>${t.fee.toFixed(2)}</td><td>${t.reason}</td>`;
      tbody.appendChild(tr);
    });
  });
}

window.addEventListener('resize', () => {
  if (Object.keys(backtestResults).length > 0) {
    drawPriceChart();
    drawEquityChart();
    drawCompareChart();
  }
});
